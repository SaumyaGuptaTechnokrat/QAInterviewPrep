  {id:75,cat:"api",q:"What is REST API vs SOAP API?",a:"<b>REST API:</b><ul><li>Uses HTTP methods (GET, POST, PUT, DELETE)</li><li>Responses in JSON or XML</li><li>Stateless — no session stored on server</li><li>Lightweight, widely used in modern web/mobile apps</li></ul><b>SOAP API:</b><ul><li>Uses XML exclusively</li><li>Follows strict WSDL contract</li><li>Supports WS-Security, WS-ReliableMessaging</li><li>Used in enterprise/legacy systems, banking</li></ul>💡 REST is preferred for new applications. SOAP is used where strict contracts and security are needed."},
  {id:76,cat:"api",q:"What are request and response headers?",a:"<b>Request Headers</b> — Sent by client:<ul><li>Content-Type: application/json — format of request body</li><li>Authorization: Bearer &lt;token&gt; — authentication token</li><li>Accept: application/json — expected response format</li></ul><b>Response Headers</b> — Sent by server:<ul><li>Content-Type: application/json — format of response body</li><li>X-Request-Id — unique request identifier for tracing</li><li>Cache-Control — caching directives</li></ul>"},
  {id:77,cat:"api",q:"How do you use Postman for API testing?",a:"<ul><li>Create Collections — Group related APIs</li><li>Set up Environments (Dev/QA/Prod) with base URLs and tokens</li><li>Add Pre-request Scripts — Set dynamic values like timestamps</li><li>Add Test Scripts — Assert status codes, response values</li><li>Use Collection Runner — Execute entire collection sequentially</li><li>Export/Import collections for team sharing</li><li>Monitor APIs on schedule</li></ul>"},
  {id:78,cat:"api",q:"What are Environment Variables in Postman?",a:"Environment Variables let you switch between environments (Dev, QA, Prod) without changing every request manually. You define variables at Environment level and reference them with double curly braces: {{base_url}}, {{auth_token}}.<br><br>Example: Set base_url = https://qa.myapp.com for QA environment, switch to https://prod.myapp.com for prod — all requests update automatically."},
  {id:79,cat:"api",q:"How do you automate API testing? What is Newman?",a:"<ul><li>Write test scripts in Postman Tests tab using pm.test() and pm.expect()</li><li>Use Collection Runner to execute test suites</li><li>Use Newman (Postman CLI) to run collections from terminal or CI/CD pipelines</li><li>Integrate Newman into GitHub Actions for automated API test runs on every PR</li></ul>Example Newman command: newman run collection.json -e environment.json --reporters cli,junit"},
  {id:80,cat:"api",q:"How do you perform authentication testing in APIs?",a:"<ul><li><b>Bearer Token:</b> Login API returns JWT token → add to Authorization header</li><li>Test authenticated endpoints WITHOUT token → Expect 401 Unauthorized</li><li>Test with expired token → Expect 401</li><li>Test with tampered/invalid token → Expect 401</li><li>Test role-based access — user token accessing admin endpoint → 403 Forbidden</li><li>Verify token expiry and refresh token flow</li></ul>"},
  {id:400,cat:"api",q:"What is JSON Schema Validation in API Testing?",a:"JSON Schema Validation verifies that the API response structure matches a predefined schema — correct field names, data types, required fields, and value ranges.<br><br><b>Why it matters:</b> An API might return status 200 but with missing fields or wrong data types, causing the UI to break silently.<br><br><b>Example schema for POST /users response:</b><br><pre style='background:var(--page);padding:.75rem;border-radius:6px;font-size:.82rem;overflow-x:auto;color:var(--text);'>{\n  \"type\": \"object\",\n  \"required\": [\"id\", \"name\", \"email\", \"createdAt\"],\n  \"properties\": {\n    \"id\":        { \"type\": \"integer\" },\n    \"name\":      { \"type\": \"string\", \"minLength\": 1 },\n    \"email\":     { \"type\": \"string\", \"format\": \"email\" },\n    \"createdAt\": { \"type\": \"string\", \"format\": \"date-time\" }\n  },\n  \"additionalProperties\": false\n}\n</pre><b>In Postman Tests tab:</b><br><pre style='background:var(--page);padding:.75rem;border-radius:6px;font-size:.82rem;overflow-x:auto;color:var(--text);'>const schema = { /* schema above */ };\npm.test('response matches schema', () => {\n  pm.response.to.have.jsonSchema(schema);\n});\n</pre>💡 Automate schema validation on every sprint to catch contract breaks early."},
  {id:401,cat:"api",q:"What is the difference between API Testing and UI Testing?",a:"<table><thead><tr><th>Aspect</th><th>API Testing</th><th>UI Testing</th></tr></thead><tbody><tr><td>What is tested</td><td>Backend business logic, data, integrations</td><td>Frontend behavior, layout, user flows</td></tr><tr><td>Speed</td><td>Very fast — no browser rendering</td><td>Slower — full browser stack</td></tr><tr><td>Stability</td><td>More stable — APIs change less</td><td>More fragile — UI locators break</td></tr><tr><td>When bugs are caught</td><td>Earlier in the dev cycle</td><td>Later — requires full integration</td></tr><tr><td>Tools</td><td>Postman, Newman, RestAssured, Playwright request</td><td>Playwright, Selenium, Cypress</td></tr><tr><td>Data validation</td><td>Direct JSON/XML response body</td><td>Text visible on screen only</td></tr></tbody></table>💡 Best practice: Test maximum logic at API level, minimal E2E flows at UI level (test pyramid approach)."},
  {id:402,cat:"api",q:"What is GraphQL Testing and how does it differ from REST API testing?",a:"<b>GraphQL</b> is a query language for APIs where the client specifies exactly what data it needs. Unlike REST's fixed endpoints, GraphQL has a single endpoint and uses queries/mutations.<br><br><b>Key differences:</b><table><thead><tr><th>Aspect</th><th>REST</th><th>GraphQL</th></tr></thead><tbody><tr><td>Endpoint</td><td>Multiple (GET /users, POST /orders)</td><td>Single (/graphql)</td></tr><tr><td>HTTP Method</td><td>GET, POST, PUT, DELETE</td><td>Always POST</td></tr><tr><td>Data fetching</td><td>Fixed response structure</td><td>Client defines shape of response</td></tr><tr><td>Over/under fetching</td><td>Common issue</td><td>Eliminated</td></tr></tbody></table><b>GraphQL test in Postman:</b> POST to /graphql with body: { \"query\": \"{ users { id name email } }\" }<br><br><b>Testing checklist:</b><ul><li>Valid queries return correct data and shape</li><li>Invalid field names return proper error messages</li><li>Mutations create/update/delete correctly</li><li>Authorization — unauthenticated queries return errors</li><li>Nested query depth limits to prevent DoS</li></ul>"},

  // ── DATABASE TESTING ──
  {id:90,cat:"database",q:"What is Database Testing and why is it important?",a:"Database Testing verifies:<ul><li>Data integrity — Data is accurate and consistent</li><li>Data validation — Data stored matches what was entered via UI or API</li><li>CRUD operations — Create, Read, Update, Delete work correctly in DB</li><li>Stored procedures and triggers work as expected</li><li>Data migration — Data moved correctly between systems</li><li>Performance — Query execution time is within limits</li></ul>💡 Without DB testing, data corruption or loss can occur silently even when the UI looks fine."},
  {id:91,cat:"database",q:"How do you validate data from UI to Database?",a:"<ul><li>Perform an action on UI (e.g., create a user)</li><li>Note the data entered on the form</li><li>Run a SQL SELECT query to fetch the record</li><li>Verify all fields match exactly what was entered on UI</li><li>Check timestamps, status fields, and default values</li></ul>Example: SELECT * FROM users WHERE email = 'test@test.com';"},
  {id:92,cat:"database",q:"What is the difference between WHERE and HAVING?",a:"<b>WHERE:</b> Filters rows BEFORE grouping. Works on individual rows.<br><b>HAVING:</b> Filters groups AFTER GROUP BY. Works on aggregated results.<br><br>Example: WHERE status = 'active' filters individual rows. HAVING COUNT(*) > 5 filters grouped results."},
  {id:93,cat:"database",q:"What is the difference between DELETE, TRUNCATE, and DROP?",a:"<ul><li><b>DELETE</b> — Removes specific rows based on WHERE condition. Can be rolled back. Triggers fire.</li><li><b>TRUNCATE</b> — Removes ALL rows instantly. Cannot be rolled back easily. No triggers. Keeps table structure.</li><li><b>DROP</b> — Removes the entire TABLE (structure + data). Cannot be undone without backup.</li></ul>💡 DELETE = reversible row removal. TRUNCATE = fast all-row removal. DROP = destroy table entirely."},
  {id:94,cat:"database",q:"Write SQL query to find duplicate records.",a:"Find duplicates by grouping on the target column and filtering where COUNT > 1:<br><br>SELECT email, COUNT(*) as count FROM users GROUP BY email HAVING COUNT(*) > 1;<br><br>To see full duplicate rows: SELECT * FROM users WHERE email IN (SELECT email FROM users GROUP BY email HAVING COUNT(*) > 1);"},
  {id:95,cat:"database",q:"Explain INNER JOIN, LEFT JOIN, RIGHT JOIN, and FULL JOIN.",a:"<b>INNER JOIN:</b> Returns only rows matching in BOTH tables.<br><b>LEFT JOIN:</b> All rows from LEFT table + matching rows from right. Non-matches = NULL on right.<br><b>RIGHT JOIN:</b> All rows from RIGHT table + matching rows from left.<br><b>FULL JOIN:</b> All rows from BOTH tables. Non-matches = NULL on the side without a match.<br><br>💡 Most commonly used in testing: INNER JOIN and LEFT JOIN to verify data relationships."},
  {id:96,cat:"database",q:"What is the difference between Primary Key, Foreign Key, and Unique Key?",a:"<b>Primary Key:</b> Uniquely identifies each record. Cannot be NULL. Only one per table. E.g., user_id.<br><b>Foreign Key:</b> References the Primary Key of another table. Enforces referential integrity. E.g., orders.user_id references users.id.<br><b>Unique Key:</b> Ensures all values in a column are unique. Can have NULL. Multiple allowed per table. E.g., email column."},
  {id:97,cat:"database",q:"What is the difference between SQL and NoSQL?",a:"<b>SQL (Relational):</b> Structured tables with predefined schema. Supports ACID transactions. E.g., MySQL, PostgreSQL, MSSQL.<br><b>NoSQL (Non-Relational):</b> Flexible schema. Types: Document (MongoDB), Key-Value (Redis), Column (Cassandra), Graph (Neo4j). Scales horizontally.<br><br>💡 Use SQL for structured, consistent data. Use NoSQL for high-volume, flexible, or unstructured data."},
  {id:500,cat:"database",q:"What are ACID properties in databases?",a:"ACID ensures reliable database transactions even in case of failures:<ul><li><b>Atomicity:</b> Transaction is all-or-nothing. Either all operations succeed, or none do. E.g., a bank transfer deducts from one account and credits another — both must succeed or neither happens.</li><li><b>Consistency:</b> Transaction brings the DB from one valid state to another. All constraints, rules, and data integrity checks are maintained.</li><li><b>Isolation:</b> Concurrent transactions do not interfere with each other. Each transaction appears to execute serially even when running in parallel.</li><li><b>Durability:</b> Once a transaction is committed, it persists permanently even if the system crashes immediately after.</li></ul>💡 As a QA, test ACID by simulating: mid-transaction failures, concurrent user operations, and system restarts during commit."},
  {id:501,cat:"database",q:"What are database indexes and why do they matter for testing?",a:"An <b>index</b> is a data structure that speeds up row retrieval on a column, similar to a book's index.<br><br><b>Why QA needs to know indexes:</b><ul><li>Performance testing — queries on indexed columns should be significantly faster</li><li>Test large datasets (100k+ rows) to expose missing indexes that cause slow queries</li><li>Verify indexes exist on frequently queried columns (user_id, email, order_status)</li><li>Watch for index degradation — too many indexes slow down INSERT/UPDATE operations</li></ul><b>Testing approach:</b><ul><li>Run EXPLAIN ANALYZE before/after index creation to compare query plans</li><li>Test search/filter features with full production-scale data volumes</li><li>Log slow queries (>500ms) as performance defects</li></ul>"},
  {id:502,cat:"database",q:"How do you test data migration?",a:"Data migration testing verifies data is correctly moved from a source system to a target system.<br><br><b>Testing checklist:</b><ol><li><b>Row count validation</b> — Record count in source must match count in target</li><li><b>Data integrity</b> — All field values transferred correctly (no truncation, encoding issues)</li><li><b>Null handling</b> — Nullable fields in source remain null in target; not converted to empty strings</li><li><b>Data type mapping</b> — Date formats, numeric precision, boolean mappings are correct</li><li><b>Referential integrity</b> — All foreign key relationships maintained</li><li><b>Duplicate check</b> — No duplicate rows created during migration</li><li><b>Performance</b> — Migration completes within the defined maintenance window</li><li><b>Rollback test</b> — Verify rollback procedure works if migration fails</li></ol>💡 Always run migration on a staging copy of production data before the actual migration."},

  // ── AGILE & SCRUM ──
  {id:50,cat:"agile-scrum",q:"Explain Agile methodology.",a:"Agile is an iterative and incremental software development approach. Key principles:<ul><li>Working software over comprehensive documentation</li><li>Customer collaboration over contract negotiation</li><li>Responding to change over following a plan</li><li>Individuals and interactions over processes and tools</li></ul>Work is done in short cycles called Sprints (typically 1-4 weeks). Each sprint delivers a potentially shippable product increment."},
  {id:51,cat:"agile-scrum",q:"What Agile/Scrum ceremonies have you participated in?",a:"<ul><li><b>Sprint Planning</b> — Define sprint goal, select backlog items, estimate effort</li><li><b>Daily Standup (15 mins)</b> — What did I do? What will I do? Any blockers?</li><li><b>Backlog Grooming/Refinement</b> — Review, clarify, and estimate upcoming stories</li><li><b>Sprint Review</b> — Demo to stakeholders, gather feedback</li><li><b>Sprint Retrospective</b> — What went well? What to improve? Action items</li></ul>"},
  {id:52,cat:"agile-scrum",q:"What is your role during Sprint Planning?",a:"<ul><li>Review User Stories and Acceptance Criteria</li><li>Identify testable scenarios and edge cases</li><li>Estimate QA effort (in story points or hours)</li><li>Flag missing or ambiguous requirements early</li><li>Plan which test cases need to be created or updated</li><li>Identify dependencies (environment, data, third-party APIs)</li></ul>"},
  {id:53,cat:"agile-scrum",q:"How do testers work in Agile vs Waterfall?",a:"<b>Waterfall:</b> Testing is a separate phase AFTER development is complete. QA receives a fully built product.<br><b>Agile:</b> QA is involved from day one. Testing happens within each sprint. Testers collaborate closely with developers and BAs.<br><br>In Agile, QA writes test cases during the sprint, tests features as they're developed, and provides continuous feedback."},
  {id:54,cat:"agile-scrum",q:"What is a User Story? What are Acceptance Criteria?",a:"A User Story describes a feature from the end user's perspective:<br><i>As a [user role], I want to [action], so that [benefit]</i><br>Example: As a customer, I want to reset my password, so that I can regain access to my account.<br><br>Acceptance Criteria are specific conditions that must be met for the story to be 'Done':<ul><li>User receives password reset email within 2 minutes</li><li>Link expires after 24 hours</li><li>Password must meet complexity requirements</li></ul>"},
  {id:55,cat:"agile-scrum",q:"What is Definition of Done (DoD)?",a:"DoD is a shared agreement on criteria that must be met for a story to be 'complete':<ul><li>Code written and peer-reviewed</li><li>Unit tests written and passing</li><li>QA test cases executed — all pass</li><li>No open critical/high defects</li><li>Code merged to main branch</li><li>Documentation updated</li><li>Product Owner acceptance</li></ul>💡 DoD prevents partially done work from entering production."},
  {id:600,cat:"agile-scrum",q:"What is story point estimation and how does QA contribute?",a:"Story points are a relative unit of effort estimate — not hours. They capture complexity, uncertainty, and effort combined.<br><br><b>Common scales:</b> Fibonacci (1, 2, 3, 5, 8, 13, 21) or T-Shirt sizes (XS, S, M, L, XL).<br><br><b>QA contribution to estimation:</b><ul><li>Estimate testing effort: number of test cases, automation needed, environment complexity</li><li>Flag if a story needs extra QA cycles (first-time complex feature vs. minor UI tweak)</li><li>Raise concerns about missing requirements that increase risk</li><li>Consider regression impact — will existing tests need updating?</li></ul><b>Planning Poker:</b> Each team member picks a card simultaneously to avoid anchoring bias. Discuss outliers to reach consensus.<br><br>💡 QA estimates should be part of the story point, not a separate track — it encourages shared ownership of quality."},
  {id:601,cat:"agile-scrum",q:"What is a Sprint Retrospective and what does QA typically raise?",a:"A Sprint Retrospective is a ceremony held at the end of each sprint where the team reflects on their process.<br><br><b>Structure (typically):</b><ul><li><b>What went well?</b> — Celebrate successes</li><li><b>What could be improved?</b> — Identify pain points</li><li><b>Action items</b> — Concrete improvements for next sprint</li></ul><b>Common QA themes raised in retros:</b><ul><li>Stories delivered too late for proper QA — need earlier dev handoff</li><li>Requirements were unclear — need better AC before sprint starts</li><li>Test environment was unstable — need dedicated QA environment</li><li>Defects reopened frequently — need better dev testing before handoff</li><li>Automation debt — need dedicated sprint time for automation maintenance</li></ul>💡 Retros are the QA lead's best tool for process improvement — bring data (defect metrics, execution rates) to make the case."},
  {id:602,cat:"agile-scrum",q:"What is Kanban and how does it differ from Scrum?",a:"<b>Kanban</b> is a continuous flow methodology focused on visualizing work and limiting work-in-progress (WIP).<br><br><table><thead><tr><th>Aspect</th><th>Scrum</th><th>Kanban</th></tr></thead><tbody><tr><td>Iteration</td><td>Fixed sprints (1–4 weeks)</td><td>Continuous flow — no fixed sprints</td></tr><tr><td>Roles</td><td>Scrum Master, PO, Dev Team</td><td>No prescribed roles</td></tr><tr><td>WIP limit</td><td>Sprint backlog limits scope</td><td>Explicit WIP limits per column</td></tr><tr><td>Planning</td><td>Sprint planning ceremony</td><td>Continuous, just-in-time</td></tr><tr><td>Best for</td><td>Feature development teams</td><td>Support, ops, bug-fix teams</td></tr></tbody></table>💡 Many QA teams use a hybrid 'Scrumban' — Scrum structure with Kanban WIP limits to manage both planned and unplanned testing work."},
  {id:603,cat:"agile-scrum",q:"How do you handle regression testing in an Agile environment with rapid releases?",a:"Regression in Agile is challenging because frequent releases leave little time for full manual regression.<br><br><b>Strategies:</b><ul><li><b>Automate regression suite</b> — Run on every CI build; aim for 80%+ automation coverage of regression</li><li><b>Risk-based regression</b> — Manually test high-risk areas; skip stable, low-change modules</li><li><b>Regression batches</b> — Group related test cases so subset regressions can be run quickly (e.g., 15-min smoke regression)</li><li><b>Impact analysis</b> — Developers communicate what changed so QA only runs affected areas</li><li><b>Rotating ownership</b> — Each sprint, one QA owns regression maintenance</li></ul><b>Metrics to track:</b><ul><li>Regression execution time (target: under 30 mins for critical paths)</li><li>Regression defect detection rate</li><li>Automation coverage %</li></ul>"},

  // ── SCENARIO-BASED ──
  {id:170,cat:"scenario-based",q:"You have only one day before release. What will you test first?",a:"<ol><li>Run Smoke Test Suite — Verify core functionality works</li><li>Critical Business Flows — Login, Payment, Checkout, Core CRUD</li><li>High-risk areas — Recently changed modules, complex integrations</li><li>Regression on critical paths only</li><li>API sanity — Key endpoints returning correct data</li></ol>Communicate to stakeholders what was NOT tested due to time constraints and document the risk."},
  {id:171,cat:"scenario-based",q:"A critical bug is found in Production. What steps will you take?",a:"<ol><li>Immediately inform team lead and stakeholders</li><li>Assess severity — is it blocking users? Data loss?</li><li>Document reproduction steps</li><li>Check logs and monitoring dashboards</li><li>Determine if it was in test scope — missed or environment-specific?</li><li>Raise a Critical/P1 bug in Jira</li><li>Developer hotfix — QA validates on staging before production deploy</li><li>Root cause analysis — why was it missed in QA?</li><li>Update test cases to prevent future leakage</li></ol>"},
  {id:172,cat:"scenario-based",q:"Developer says 'Works on my machine.' What will you do?",a:"<ul><li>Provide exact reproduction steps and environment details</li><li>Share screenshots, video recording, and browser console logs</li><li>Share API request/response captured in network tab</li><li>Ask developer to test on QA environment (not local)</li><li>Check if it's browser/OS/data specific</li><li>Pair with developer to reproduce together if needed</li><li>Escalate if issue cannot be resolved — involve BA or lead</li></ul>"},
  {id:173,cat:"scenario-based",q:"Requirement changes during sprint. How will you handle it?",a:"<ul><li>Assess impact — how many test cases are affected?</li><li>Inform QA lead and update sprint scope if needed</li><li>Update test cases to reflect new requirements</li><li>Check if change affects existing automated tests — update scripts</li><li>Re-estimate if significant additional effort is needed</li><li>Raise in sprint retrospective to improve requirement process</li></ul>"},
  {id:174,cat:"scenario-based",q:"The application crashes intermittently. How will you investigate?",a:"<ul><li>Try to reproduce consistently — note exact steps, data, and environment</li><li>Check application logs and error logs at the time of crash</li><li>Check system resources — CPU, memory usage during crash</li><li>Test in different environments/browsers/devices to isolate</li><li>Look for patterns — specific data? Time of day? Concurrent users?</li><li>Involve developer to analyze stack trace / crash dump</li><li>Test with network throttling — may be a timeout issue</li></ul>"},
  {id:175,cat:"scenario-based",q:"A release contains 100 open defects. Will you recommend release?",a:"This depends on severity distribution:<ul><li>If critical/high defects exist → Recommend NO release. Risk to business/users is too high.</li><li>If all 100 are medium/low → Discuss with stakeholders. Document known issues. Release with risk accepted by Product Owner.</li></ul>As QA Lead, my role is to clearly communicate the risk, not block unilaterally. The final decision is a business decision — but all stakeholders must be aware of the risk. Document agreed known issues in release notes."},
  {id:700,cat:"scenario-based",q:"How do you handle testing when there are no requirements or documentation?",a:"This is common in fast-moving startups. Strategies to handle it:<ul><li><b>Exploratory Testing:</b> Use the application to understand intended behavior, document findings</li><li><b>Reverse-engineer requirements:</b> Discuss with developers and BA to capture implied requirements as user stories</li><li><b>Reference existing systems:</b> If it's a redesign, use the old system as a requirements baseline</li><li><b>Test based on user perspective:</b> What would a real user do? Map out key workflows</li><li><b>Ask stakeholders:</b> Schedule a quick walkthrough with the product owner</li><li><b>Document as you go:</b> Write test cases as you discover behavior — these become the living documentation</li></ul>💡 Raise the lack of documentation in the next sprint retro as a process risk."},
  {id:701,cat:"scenario-based",q:"You joined a new project mid-sprint. How do you get up to speed quickly?",a:"<b>Day 1-2:</b><ul><li>Access: Get Jira, Git, test environment, Postman collections, Confluence</li><li>Read: existing test plans, test cases, RTM, recent release notes</li><li>Review: current sprint stories and their acceptance criteria</li></ul><b>Day 3-5:</b><ul><li>Explore the application manually to understand core workflows</li><li>Read open defects to understand known issues and risk areas</li><li>Talk to team members: lead dev, BA, QA lead — understand the system's history</li><li>Run existing automation suite and review what passes/fails</li></ul><b>Week 2:</b><ul><li>Pick up a mid-complexity story to start contributing</li><li>Ask targeted questions — don't try to know everything before starting</li></ul>💡 Show initiative by starting small and delivering correctly, rather than waiting for perfect context."},
  {id:702,cat:"scenario-based",q:"How would you test a newly released third-party API integration?",a:"When testing a third-party API integration (payment gateway, SMS provider, maps API, etc.):<br><br><b>Functional:</b><ul><li>Happy path — successful integration end-to-end (e.g., payment goes through)</li><li>Error responses — what happens when third-party returns 4xx/5xx errors?</li><li>Timeout handling — what if the third-party is slow or unresponsive?</li><li>Authentication — API key/OAuth correctly passed</li></ul><b>Resilience:</b><ul><li>Mock the third-party API (using Playwright route(), WireMock, or Mockoon) to simulate outage scenarios</li><li>Retry logic — does the app retry on transient failures?</li><li>Circuit breaker — does the app degrade gracefully instead of hanging?</li></ul><b>Data:</b><ul><li>Use sandbox/test credentials provided by the third party</li><li>Verify data returned by third party is correctly stored in DB</li><li>Webhook testing — does the app correctly handle callback events?</li></ul>"},
  {id:703,cat:"scenario-based",q:"A junior QA tester on your team is consistently missing edge cases. How do you address it?",a:"This is a coaching and process problem, not just a skills gap.<br><br><b>Immediate actions:</b><ul><li>Review their test cases with them — don't just reject; explain the thinking process behind edge cases</li><li>Share a test design checklist: BVA, EP, negative scenarios, security, performance</li><li>Pair them with a senior tester on the next complex story (pair testing)</li></ul><b>Structural actions:</b><ul><li>Introduce a peer review process for test cases before execution</li><li>Hold regular knowledge-sharing sessions on test techniques</li><li>Create module-specific checklists for common edge cases (e.g., date fields, file uploads)</li></ul><b>Growth actions:</b><ul><li>Set a clear goal: after 4 weeks, review improvement in test case quality</li><li>Assign them a slightly more challenging story and provide support</li></ul>💡 Good QA leads build team capability — not just fix their own output."},
  {id:704,cat:"scenario-based",q:"How do you handle testing when the dev environment is frequently unstable?",a:"An unstable environment is one of the most common real-world QA challenges.<br><br><b>Short-term mitigations:</b><ul><li>Test at off-peak times (early morning) when fewer deployments happen</li><li>Always verify environment health before starting (smoke test / health endpoint check)</li><li>Log environment issues separately from actual defects in Jira</li><li>Keep a parallel task list (documentation, test case writing) to stay productive during downtime</li></ul><b>Escalation:</b><ul><li>Track environment downtime and present data in sprint retro</li><li>Raise a formal request for a dedicated, stable QA environment</li><li>Advocate for infrastructure-as-code and containerized environments (Docker)</li></ul><b>Process adjustment:</b><ul><li>Shift more testing to API level (more stable than UI) until environment stabilizes</li><li>Use mocks and stubs for unavailable dependencies</li></ul>"},

  // ── CLOUD & SECURITY ──
  {id:140,cat:"cloud-security",q:"What is Cloud Testing?",a:"Cloud Testing involves testing web applications deployed on cloud infrastructure (AWS, Azure, GCP). It focuses on:<ul><li>Availability — Accessible from different regions?</li><li>Scalability — Can it handle increased load (auto-scaling)?</li><li>Performance — Response times under load</li><li>Security — Proper access controls, data encryption</li><li>Disaster Recovery — Failover and backup mechanisms</li></ul>"},
  {id:141,cat:"cloud-security",q:"What validations do you perform after cloud deployment?",a:"<ul><li>Smoke test all critical endpoints in the new environment</li><li>Verify environment variables and configuration</li><li>Check health endpoints (/health, /status)</li><li>Validate SSL certificate and HTTPS</li><li>Test performance from different regions</li><li>Check log aggregation (CloudWatch/Azure Monitor)</li><li>Verify backup and restore procedures</li><li>Test auto-scaling triggers under load</li></ul>"},
  {id:142,cat:"cloud-security",q:"What is Security Testing? What validations do you perform?",a:"Security Testing identifies vulnerabilities, threats, and risks in applications.<br><br>Key security tests QA performs:<ul><li><b>Authentication testing</b> — Valid/invalid tokens, session management</li><li><b>Authorization testing</b> — Role-based access, privilege escalation</li><li><b>SQL Injection</b> — Inject SQL via input fields; system should sanitize</li><li><b>XSS (Cross-Site Scripting)</b> — Inject scripts; app should escape output</li><li><b>Password security</b> — Complexity enforcement, hashing (not plain text)</li><li><b>HTTPS validation</b> — Sensitive data only over encrypted connections</li></ul>"},
  {id:143,cat:"cloud-security",q:"What is SQL Injection and XSS? How do you test for them?",a:"<b>SQL Injection:</b> Attacker inserts malicious SQL via input fields to manipulate the database.<br>Test: Enter admin' -- in login field → App should reject or sanitize, not bypass auth.<br><br><b>XSS (Cross-Site Scripting):</b> Attacker injects malicious scripts into web pages viewed by others.<br>Test: Enter &lt;script&gt;alert('XSS')&lt;/script&gt; in input fields → Script should be escaped/sanitized, not executed.<br><br>💡 As QA, we verify these are handled correctly. Actual exploitation is done by dedicated security/pen test teams."},
  {id:800,cat:"cloud-security",q:"What is OWASP Top 10 and how does it guide QA security testing?",a:"The <b>OWASP Top 10</b> is a widely-recognized list of the most critical web application security risks, published by the Open Web Application Security Project.<br><br><b>Key items relevant to QA:</b><ul><li><b>A01 — Broken Access Control:</b> Test that users can only access resources they're authorized for. Try accessing admin endpoints with a regular user token.</li><li><b>A02 — Cryptographic Failures:</b> Verify passwords are hashed (not plain text), sensitive data is encrypted at rest and in transit (HTTPS only).</li><li><b>A03 — Injection (SQL, NoSQL, LDAP):</b> Input malicious query strings in all input fields. App should sanitize and reject.</li><li><b>A05 — Security Misconfiguration:</b> Check for default credentials, exposed error messages with stack traces, unnecessary ports open.</li><li><b>A07 — Identification and Authentication Failures:</b> Test account lockout, weak password policies, session fixation.</li></ul>💡 Use OWASP Top 10 as a security testing checklist alongside every release."},
  {id:801,cat:"cloud-security",q:"What is the difference between Authentication and Authorization? How do you test both?",a:"<b>Authentication:</b> Verifying WHO you are — the process of confirming identity.<br><b>Authorization:</b> Verifying WHAT you can do — the process of checking permissions.<br><br><b>Testing Authentication:</b><ul><li>Valid credentials → access granted</li><li>Invalid credentials → 401, correct error message</li><li>Account lockout after N failed attempts</li><li>Expired token → 401, redirect to login</li><li>Missing token → 401</li><li>Multi-factor authentication flow</li></ul><b>Testing Authorization (RBAC):</b><ul><li>Admin user can access admin panel</li><li>Regular user accessing admin endpoint → 403 Forbidden</li><li>User A cannot view/edit User B's data (horizontal privilege escalation)</li><li>Regular user performing admin-only actions → 403</li><li>Deleted/suspended user cannot log in</li></ul>💡 Always test privilege escalation both vertically (user → admin) and horizontally (user A → user B)."},

  // ── PERFORMANCE TESTING ──
  {id:150,cat:"performance",q:"What is Performance Testing? Explain different types.",a:"Performance Testing verifies how a system behaves under various load conditions.<br><br><b>Types:</b><ul><li><b>Load Testing:</b> Test under expected normal and peak load. E.g., 1000 concurrent users.</li><li><b>Stress Testing:</b> Push beyond limits to find breaking point. E.g., gradually increase to 10,000 users.</li><li><b>Spike Testing:</b> Sudden burst of users. E.g., flash sale scenario — 0 to 5000 users in seconds.</li><li><b>Volume Testing:</b> Large amounts of data. E.g., DB with 10 million records.</li><li><b>Endurance/Soak Testing:</b> Extended duration at normal load. E.g., 72 hours to detect memory leaks.</li></ul>"},
  {id:151,cat:"performance",q:"What performance testing tools have you used?",a:"<ul><li><b>JMeter (Apache)</b> — Open source, widely used for load/stress testing.</li><li><b>k6</b> — Modern load testing tool using JavaScript. CI/CD-friendly.</li><li><b>Gatling</b> — Scala-based, high-performance simulation tool.</li><li><b>Locust</b> — Python-based, distributed load testing.</li><li>Cloud: AWS Load Testing, BlazeMeter, Azure Load Testing</li></ul>"},
  {id:152,cat:"performance",q:"What are throughput, response time, and concurrent users?",a:"<b>Response Time:</b> Time taken for the server to respond to a single request. Target: &lt; 2 seconds for most web actions.<br><b>Throughput:</b> Number of requests processed per second (RPS/TPS). Higher is better under same load.<br><b>Concurrent Users:</b> Number of users simultaneously interacting with the system.<br><b>Latency:</b> Time from sending request to receiving first byte of response."},
  {id:900,cat:"performance",q:"How do you define performance benchmarks and pass/fail criteria?",a:"Performance benchmarks set measurable targets that define acceptable performance.<br><br><b>Typical benchmarks:</b><ul><li>Response time P95 &lt; 2 seconds (95th percentile)</li><li>Response time P99 &lt; 5 seconds (99th percentile)</li><li>Error rate &lt; 0.5% under normal load</li><li>Throughput ≥ 500 RPS at 1000 concurrent users</li><li>CPU usage &lt; 70% under peak load</li><li>Memory stable (no growth pattern indicating memory leak) over soak test</li></ul><b>How to define them:</b><ul><li>Work with business to understand expected peak traffic</li><li>Use production monitoring data (APM tools: Datadog, New Relic) as baseline</li><li>Define separately for critical paths (login, checkout) vs. informational pages</li></ul>💡 Always use percentiles (P95, P99) not averages — averages hide the worst-case user experience."},
  {id:901,cat:"performance",q:"What is a memory leak and how do you detect it in testing?",a:"A <b>memory leak</b> occurs when an application allocates memory but fails to release it after it's no longer needed. Over time, memory consumption grows and the application eventually crashes or degrades severely.<br><br><b>Detection in performance testing:</b><ul><li>Run an <b>endurance/soak test</b> — execute load at normal levels for 4–8 hours</li><li>Monitor memory usage over time using APM tools (Datadog, Grafana, JMeter listeners)</li><li>If memory grows steadily without stabilizing → memory leak suspected</li><li>Look for OOM (Out of Memory) errors in application logs</li><li>Check GC (Garbage Collection) logs for frequent full GC events</li></ul><b>Common causes:</b><ul><li>Event listeners not removed</li><li>Database connections not closed</li><li>Caching without eviction policy</li><li>Static collections that grow indefinitely</li></ul>💡 Memory leaks are invisible in short tests — soak testing is the only reliable way to detect them."},
  {id:902,cat:"performance",q:"How do you write a basic k6 load test script?",a:"k6 is a modern, developer-friendly load testing tool using JavaScript.<br><br><b>Basic script:</b><br><pre style='background:var(--page);padding:.75rem;border-radius:6px;font-size:.82rem;overflow-x:auto;color:var(--text);'>import http from 'k6/http';\nimport { sleep, check } from 'k6';\n\nexport const options = {\n  vus: 100,           // 100 virtual users\n  duration: '5m',    // run for 5 minutes\n  thresholds: {\n    http_req_duration: ['p(95)&lt;2000'], // 95% requests under 2s\n    http_req_failed:   ['rate&lt;0.01'],  // error rate under 1%\n  }\n};\n\nexport default function () {\n  const res = http.post(\n    'https://staging.myapp.com/api/login',\n    JSON.stringify({ email: 'test@qa.com', password: 'Pass123' }),\n    { headers: { 'Content-Type': 'application/json' } }\n  );\n\n  check(res, {\n    'status is 200':       r => r.status === 200,\n    'response has token':  r => JSON.parse(r.body).token !== undefined,\n    'response time ok':    r => r.timings.duration &lt; 2000,\n  });\n\n  sleep(1); // 1 second think time between requests\n}\n</pre>Run with: k6 run script.js<br>Output: RPS, response times (P50/P90/P95/P99), error rate, pass/fail thresholds."},

  // ── LEADERSHIP ──
  {id:160,cat:"leadership",q:"How do you prepare a Test Plan?",a:"A Test Plan document includes:<ul><li>Scope — What is IN scope and OUT of scope</li><li>Objectives — Goals of testing</li><li>Testing Types — Functional, Regression, API, Performance, UAT</li><li>Resources — Team members, tools (Jira, Postman, Playwright)</li><li>Schedule — Start/end dates, milestones</li><li>Risks &amp; Mitigation — E.g., environment unavailability</li><li>Entry/Exit Criteria</li><li>Deliverables — Test cases, defect reports, summary report</li></ul>"},
  {id:161,cat:"leadership",q:"How do you estimate testing effort for a project?",a:"Common techniques:<ul><li><b>Work Breakdown Structure (WBS)</b> — Break features into tasks and estimate each</li><li><b>Three-point estimation</b> — (Optimistic + 4×Most Likely + Pessimistic) / 6</li><li><b>Historical data</b> — Use past similar project data as baseline</li></ul>Factors: number of test cases, complexity, team experience, environment stability, automation coverage."},
  {id:162,cat:"leadership",q:"How do you prioritize testing when timelines are tight?",a:"<ul><li>Focus on critical business flows first (login, payment, checkout)</li><li>Execute smoke test suite to validate basic functionality</li><li>Use risk-based testing — test high-risk areas first</li><li>Defer low-priority/cosmetic tests to next cycle</li><li>Reuse existing regression suite for quick coverage</li></ul>💡 Always communicate risk to stakeholders if critical areas are not tested."},
  {id:163,cat:"leadership",q:"What metrics do you track during testing?",a:"<ul><li>Test Case Execution % — (Executed / Total) × 100</li><li>Defect Density — Defects per module or per KLOC</li><li>Defect Leakage — Bugs found in production missed in QA</li><li>Pass/Fail Rate — % of test cases passing</li><li>Defect Reopen Rate — % of bugs reopened after fix</li><li>Test Coverage — % of requirements covered by test cases</li></ul>"},
  {id:164,cat:"leadership",q:"How do you distribute work among a team of testers?",a:"<ul><li>Assign modules based on each tester's domain expertise</li><li>Balance workload — measure in test cases or story points</li><li>Assign 1-2 automation engineers to automated regression suite</li><li>Keep 1 person for API/backend testing, 1 for UI, 1 for mobile if applicable</li><li>Daily standups to track progress and remove blockers</li><li>Cross-review test cases for quality and coverage</li></ul>"},
  {id:165,cat:"leadership",q:"How do you mentor junior QA engineers?",a:"<ul><li>Conduct knowledge-sharing sessions on tools, techniques, and best practices</li><li>Review their test cases and provide constructive feedback</li><li>Pair them with senior testers on complex modules (pair testing)</li><li>Share checklists, templates, and reference guides</li><li>Give them increasing responsibility over time</li><li>Conduct regular 1:1s to understand blockers and career goals</li></ul>"},
  {id:166,cat:"leadership",q:"How do you define release readiness?",a:"Release readiness is confirmed when:<ul><li>All planned test cases executed</li><li>No open Critical or High severity defects</li><li>Medium/Low defects accepted as known issues or deferred</li><li>Smoke test and regression test suites pass</li><li>UAT signed off by Product Owner</li><li>Performance benchmarks met</li><li>Documentation updated</li></ul>A formal Go/No-Go decision is made with stakeholders before release."},
  {id:1000,cat:"leadership",q:"How do you build a QA strategy for a new product from scratch?",a:"Building a QA strategy from scratch requires aligning testing approach with product risk, team maturity, and business goals.<br><br><b>Steps:</b><ol><li><b>Understand the product:</b> Domain, user personas, critical business flows, tech stack</li><li><b>Define scope:</b> What must be tested every release vs. periodically</li><li><b>Select testing types:</b> Functional, API, performance, security, UAT — based on risk</li><li><b>Choose tools:</b> Test management (TestRail/Xray), bug tracking (Jira), automation (Playwright), API (Postman), performance (k6)</li><li><b>Define test environments:</b> Dev, QA, Staging, Prod — each with clear purpose</li><li><b>Automation strategy:</b> Pyramid model — unit (70%), API (20%), UI E2E (10%)</li><li><b>Metrics:</b> Define KPIs upfront — defect leakage, automation %, execution time</li><li><b>Process:</b> Define when testing starts, entry/exit criteria, release checklist</li></ol>💡 Document the strategy in a Test Strategy document and get stakeholder buy-in before execution begins."},
  {id:1001,cat:"leadership",q:"How do you handle conflict between QA and developers?",a:"QA-developer conflict is usually about defect validity, timelines, or quality standards. As a QA Lead:<br><br><b>Prevent conflict proactively:</b><ul><li>Involve developers in requirement reviews — shared understanding reduces disputes</li><li>Define clear acceptance criteria before development starts</li><li>Build a culture where quality is a shared responsibility, not 'QA's problem'</li></ul><b>When conflict arises:</b><ul><li>Separate the issue from the person — discuss the defect, not the developer</li><li>Always have evidence: screenshots, logs, steps to reproduce</li><li>Refer to requirements/AC as the source of truth</li><li>If still disputed, loop in the Product Owner to make the call</li><li>Log everything formally in Jira — verbal agreements get forgotten</li></ul>💡 The goal is shared: ship a quality product. Frame every discussion around that shared goal."},
  {id:1002,cat:"leadership",q:"How do you measure and improve automation ROI?",a:"Automation ROI = Time Saved / Investment Cost. But it's more nuanced than a single formula.<br><br><b>Measuring ROI:</b><ul><li><b>Time saved:</b> (Manual execution time × runs per year) − (Automation maintenance time + execution time)</li><li><b>Defects caught:</b> Bugs found by automation before production (assign cost per production bug)</li><li><b>Release velocity:</b> Reduction in release cycle time due to faster regression</li></ul><b>Improving ROI:</b><ul><li>Automate high-frequency, high-risk test cases first</li><li>Maintain automation suite — flaky tests that need rework reduce ROI</li><li>Run on CI/CD — automated tests that run manually have low ROI</li><li>Track flakiness rate — aim for &lt; 2% flaky tests</li><li>Don't automate tests that change every sprint — ROI goes negative fast</li></ul>💡 Present automation ROI as business value: 'Our 400 automated tests run in 8 minutes vs. 3 days manual — saving X engineer-days per sprint.'"},

  // ── MOBILE TESTING ──
  {id:130,cat:"mobile",q:"What are the different types of mobile applications?",a:"<ul><li><b>Native Apps:</b> Built for a specific OS (Android/iOS). E.g., apps built with Kotlin, Swift. Best performance.</li><li><b>Web Apps:</b> Mobile-optimized websites accessed via browser. E.g., Progressive Web Apps.</li><li><b>Hybrid Apps:</b> Web technologies wrapped in a native container. E.g., React Native, Flutter, Ionic.</li></ul>💡 Testing approach differs: Native needs platform-specific tools; Hybrid can use Appium for cross-platform automation."},
  {id:131,cat:"mobile",q:"What testing is specific to mobile applications?",a:"<ul><li>Orientation Testing — Portrait and landscape mode</li><li>Network Testing — 2G/3G/4G/5G/Wi-Fi/Offline behavior</li><li>Installation Testing — Install, uninstall, update scenarios</li><li>Compatibility Testing — Different devices, screen sizes, OS versions</li><li>Interrupt Testing — Calls, SMS, notifications during app use</li><li>Battery/Memory Testing — Impact on device resources</li><li>Touch Gesture Testing — Swipe, pinch, zoom</li><li>App permissions — Camera, location, microphone</li></ul>"},
  {id:132,cat:"mobile",q:"How do you test mobile apps on different devices?",a:"<ul><li>Physical devices — Most reliable, use real device labs</li><li>Emulators/Simulators — Android Studio emulator, Xcode simulator</li><li>Cloud device farms — BrowserStack, AWS Device Farm, Sauce Labs</li><li>Appium for mobile test automation (cross-platform)</li><li>Test on various OS versions — Android 10–14, iOS 15–18</li></ul>"},
  {id:1100,cat:"mobile",q:"What is Appium and how does it work for mobile automation?",a:"<b>Appium</b> is an open-source, cross-platform mobile automation framework that supports Native, Hybrid, and Mobile Web applications on both iOS and Android.<br><br><b>How it works:</b><ul><li>Appium uses the WebDriver protocol to communicate with mobile devices</li><li>For Android: Uses UIAutomator2 (or older UIAutomator)</li><li>For iOS: Uses XCUITest framework under the hood</li><li>Tests written once can run on both platforms with minor configuration differences</li></ul><b>Architecture:</b><ul><li>Test Script (Java/Python/JS) → Appium Client → Appium Server → Mobile Device/Emulator</li></ul><b>Key capabilities in desired capabilities:</b><ul><li>platformName: 'Android' or 'iOS'</li><li>deviceName: device UDID or emulator name</li><li>appPackage: app identifier</li><li>automationName: 'UiAutomator2' or 'XCUITest'</li></ul>💡 Playwright does NOT support mobile native apps — Appium is the standard for native mobile automation."},
  {id:1101,cat:"mobile",q:"How do you test push notifications in a mobile application?",a:"Push notification testing verifies that notifications are delivered correctly, on time, and with the right content.<br><br><b>What to test:</b><ul><li>Notification received when app is in foreground, background, and killed state</li><li>Notification content — title, body, deep link, image, action buttons correct</li><li>Deep link — tapping notification opens correct screen in app</li><li>Notification not shown when user has disabled notifications (OS-level permission)</li><li>Badge count updates correctly on app icon</li><li>Silent/data-only notifications processed correctly in background</li></ul><b>Testing approaches:</b><ul><li>Trigger via backend test API or admin panel</li><li>Use Firebase Console for manual test sends (FCM for Android)</li><li>Use APNs Sandbox for iOS push notification testing</li><li>Test with flight mode to verify behavior when network is unavailable</li></ul>"},
  {id:1102,cat:"mobile",q:"What is the difference between an Emulator and a Simulator?",a:"<b>Emulator (Android):</b><ul><li>Emulates both the hardware AND software of a device</li><li>Runs Android OS on virtual hardware that mimics real device hardware</li><li>Slower to start but more faithful to real device behavior</li><li>Can test hardware features (GPS, sensors) via simulated input</li><li>Tool: Android Studio AVD (Android Virtual Device)</li></ul><b>Simulator (iOS):</b><ul><li>Simulates only the SOFTWARE environment, not the actual hardware</li><li>Runs on macOS using native OS APIs — much faster</li><li>Cannot test actual device-level hardware behavior (camera, biometrics)</li><li>Tool: Xcode Simulator</li></ul><b>Key testing implication:</b><ul><li>Emulators/simulators cannot fully replicate performance, battery usage, real network conditions, or hardware-specific bugs</li><li>Always test critical scenarios on real devices before release</li></ul>"},

  // ── PROJECT-BASED ──
  {id:190,cat:"project-based",q:"How do you explain your current project in an interview?",a:"Structure your answer using this framework:<br><b>1. Domain &amp; Overview:</b> 'I work on a [fintech/e-commerce/healthcare] application that [what it does].'<br><b>2. Team structure:</b> 'The team consists of [X developers, Y QAs, BA, Scrum Master].'<br><b>3. Your role:</b> 'I am responsible for [manual testing, API testing, automation, leading the QA team].'<br><b>4. Testing activities:</b> Agile ceremonies, test case design, API testing with Postman, DB validation, Playwright automation.<br><b>5. Key achievements:</b> 'I built the automation framework / reduced regression time by X% / found a critical defect that prevented data loss.'"},
  {id:191,cat:"project-based",q:"What are your day-to-day responsibilities as a QA?",a:"<ul><li>Attend daily standup — share progress and blockers</li><li>Review user stories and acceptance criteria</li><li>Write and execute test cases for current sprint features</li><li>Log defects in Jira with detailed steps and evidence</li><li>Retest fixed defects and close or reopen them</li><li>Update automation scripts for new features</li><li>API testing with Postman for backend validation</li><li>Database validation via SQL queries</li><li>Participate in sprint review and retrospective</li></ul>"},
  {id:192,cat:"project-based",q:"What was the most challenging issue you faced in testing?",a:"Sample structure:<br><b>Situation:</b> 'We had an intermittent payment failure affecting 5% of transactions.'<br><b>Challenge:</b> 'Hard to reproduce consistently and dev team said it was not reproducible on their end.'<br><b>Action:</b> 'I captured network logs, replicated specific payment data patterns, and worked with dev to analyze server-side logs.'<br><b>Result:</b> 'We identified a race condition in the payment service. Fixing it eliminated the failures.'<br><b>Learning:</b> 'Always capture detailed environment and timing data for intermittent bugs.'"},
  {id:193,cat:"project-based",q:"How do you ensure overall product quality as a QA engineer?",a:"<ul><li>Early involvement — review requirements and flag issues before development</li><li>Comprehensive test coverage — functional, negative, boundary, integration</li><li>Maintain and update regression suite regularly</li><li>API and DB validation to ensure end-to-end data integrity</li><li>Defect trend analysis — identify error-prone areas</li><li>Collaborate closely with developers and BA</li><li>Post-release monitoring — check logs, user reports</li><li>Continuous improvement — retrospectives, process improvements</li></ul>💡 Quality is everyone's responsibility, but QA is the guardian of the process."},
  {id:1200,cat:"project-based",q:"How do you handle a situation where you disagree with the Product Owner about release readiness?",a:"This is a common scenario that tests both technical judgment and professional maturity.<br><br><b>Step 1 — Present data, not opinion:</b><ul><li>Show the open defect list with severity/priority breakdown</li><li>Quantify business risk: 'This P2 defect affects checkout for 15% of users on iOS'</li><li>Share test metrics: % executed, pass rate, defect trends</li></ul><b>Step 2 — Make the risk visible:</b><ul><li>Formally document the risks in a Go/No-Go recommendation</li><li>Present best case and worst case scenarios</li></ul><b>Step 3 — Respect the business decision:</b><ul><li>The PO has the authority to accept risk and release</li><li>Ensure they acknowledge the risk formally (written sign-off)</li><li>Document known issues in release notes</li><li>Prepare a hotfix testing plan for post-release issues</li></ul>💡 Your job is to make risk visible — not to veto releases. But always get the risk acceptance in writing."},
  {id:1201,cat:"project-based",q:"Describe how you would build an automation framework for a project from scratch.",a:"Building a Playwright + TypeScript framework from scratch:<br><br><b>Week 1 — Foundation:</b><ul><li>Initialize: npm init, install @playwright/test, typescript, dotenv</li><li>Set up playwright.config.ts (baseURL, browsers, timeouts, reporters)</li><li>Create folder structure: tests/, pages/, fixtures/, utils/, test-data/, reports/</li><li>Set up .env files for each environment</li><li>Configure tsconfig.json</li></ul><b>Week 2 — Core Framework:</b><ul><li>Implement base Page Object class with common methods</li><li>Create page objects for top 5 most-used pages</li><li>Set up global auth setup (storageState) to avoid login per test</li><li>Create custom fixtures for common preconditions</li><li>Implement API helper utility for backend setup/teardown</li></ul><b>Week 3 — CI/CD Integration:</b><ul><li>GitHub Actions pipeline: install → browsers → test → upload report</li><li>Set up Allure reporting with trend tracking</li><li>Configure Slack/email notifications on failure</li><li>Set up test tagging (@smoke, @regression, @sanity)</li></ul><b>Week 4 — Test Coverage:</b><ul><li>Write smoke test suite (15-20 critical path tests)</li><li>Write regression suite for stable features</li><li>Document framework usage for team onboarding</li></ul>"}
];

const SECTIONS = [
  { key:'all',            label:'All Categories',        icon:'📁' },
  { key:'qa-fundamentals',label:'QA Fundamentals',       icon:'🧠' },
  { key:'manual',         label:'Manual Testing',        icon:'🛠️' },
  { key:'automation',     label:'Automation Testing',    icon:'🤖' },
  { key:'api',            label:'API Testing',           icon:'🌐' },
  { key:'database',       label:'Database Testing',      icon:'🗄️' },
  { key:'agile-scrum',    label:'Agile & Scrum',         icon:'🔄' },
  { key:'scenario-based', label:'Scenario Based',        icon:'📋' },
  { key:'cloud-security', label:'Cloud & Security',      icon:'☁️' },
  { key:'performance',    label:'Performance Testing',   icon:'⚡' },
  { key:'leadership',     label:'Leadership & Strategy', icon:'👑' },
  { key:'mobile',         label:'Mobile Testing',        icon:'📱' },
  { key:'project-based',  label:'Project Based',         icon:'💼' },
];

let activeCat = 'all';

function countFor(key){ return key==='all'?data.length:data.filter(d=>d.cat===key).length; }

function buildNav(){
  const body = document.getElementById('navBody');
  const groups = [
    {label:'Overview', keys:['all']},
    {label:'Core Testing', keys:['qa-fundamentals','manual','automation']},
    {label:'Technical', keys:['api','database','performance','cloud-security']},
    {label:'Process', keys:['agile-scrum','scenario-based','leadership']},
    {label:'Platform', keys:['mobile','project-based']},
  ];
  body.innerHTML = groups.map(g=>`
    <div class="nav-section">
      <div class="nav-group-label">${g.label}</div>
      ${g.keys.map(k=>{
        const s=SECTIONS.find(x=>x.key===k);
        const cnt=countFor(k);
        return `<button class="tab-btn${k===activeCat?' active':''}" onclick="goSection('${k}')" title="${s.label}">
          <span class="tab-ico">${s.icon}</span>
          <span class="tab-label">${s.label}</span>
          <span class="tab-count">${cnt}</span>
        </button>`;
      }).join('')}
    </div>
  `).join('');
}

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=768){
    sb.classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  } else {
    sb.classList.toggle('collapsed');
  }
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function getCurrentSecIndex(){ return SECTIONS.findIndex(s=>s.key===activeCat); }

function navigateSection(dir){
  const idx=getCurrentSecIndex();
  const next=idx+dir;
  if(next>=0&&next<SECTIONS.length) goSection(SECTIONS[next].key);
}

function goSection(cat){
  activeCat=cat;
  currentQPage=1;
  document.getElementById('searchInput').value='';
  buildNav();
  if(window.innerWidth<=768) closeSidebar();
  render();
}

function goQPage(p){
  currentQPage=p;
  render();
  document.getElementById('content').scrollTop=0;
}

function buildQPagination(filtered){
  const total=filtered.length;
  const totalPages=Math.ceil(total/Q_PER_PAGE);
  const bar=document.getElementById('qPagBar');
  const btns=document.getElementById('qPagBtns');
  const info=document.getElementById('qPagInfo');

  if(totalPages<=1){bar.style.display='none';return;}
  bar.style.display='flex';

  const start=(currentQPage-1)*Q_PER_PAGE+1;
  const end=Math.min(currentQPage*Q_PER_PAGE,total);
  info.textContent=`Showing ${start}–${end} of ${total}`;

  // Build page buttons
  let html='';
  // Prev button
  html+=`<button class="q-pag-btn" onclick="goQPage(${currentQPage-1})" ${currentQPage===1?'disabled':''} title="Previous page">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>`;

  // Page number buttons (smart windowing)
  const pages=[];
  if(totalPages<=7){
    for(let i=1;i<=totalPages;i++) pages.push(i);
  } else {
    pages.push(1);
    if(currentQPage>3) pages.push('…');
    for(let i=Math.max(2,currentQPage-1);i<=Math.min(totalPages-1,currentQPage+1);i++) pages.push(i);
    if(currentQPage<totalPages-2) pages.push('…');
    pages.push(totalPages);
  }

  for(const p of pages){
    if(p==='…'){
      html+=`<span class="q-pag-dots">…</span>`;
    } else {
      html+=`<button class="q-pag-btn${p===currentQPage?' active':''}" onclick="goQPage(${p})" title="Page ${p}">${p}</button>`;
    }
  }

  // Next button
  html+=`<button class="q-pag-btn" onclick="goQPage(${currentQPage+1})" ${currentQPage===totalPages?'disabled':''} title="Next page">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>`;

  btns.innerHTML=html;
}

function render(filter=''){
  const filtered=data.filter(item=>
    (activeCat==='all'||item.cat===activeCat)&&
    (!filter||item.q.toLowerCase().includes(filter)||item.a.toLowerCase().includes(filter))
  );

  const sec=SECTIONS.find(s=>s.key===activeCat);
  document.getElementById('secIcon').textContent=sec?sec.icon:'📁';
  document.getElementById('sectionTitle').textContent=sec?sec.label:'All';
  document.getElementById('countBadge').textContent=`${filtered.length} question${filtered.length!==1?'s':''}`;

  // Section navigation bar
  const idx=getCurrentSecIndex();
  document.getElementById('prevSecBtn').disabled=idx<=0;
  document.getElementById('nextSecBtn').disabled=idx>=SECTIONS.length-1;
  document.getElementById('secPos').textContent=`${idx+1} / ${SECTIONS.length}`;
  const pills=document.getElementById('secPills');
  pills.innerHTML=SECTIONS.map((s,i)=>
    `<button class="sec-pill${s.key===activeCat?' active':''}" onclick="goSection('${s.key}')" title="${s.label}" aria-label="${s.label}">${s.icon}</button>`
  ).join('');

  const container=document.getElementById('questionsContainer');
  if(filtered.length===0){
    document.getElementById('qPagBar').style.display='none';
    container.innerHTML=`<div class="no-results">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      No questions found. Try a different search or category.
    </div>`;
    return;
  }

  // Cap currentQPage
  const totalPages=Math.ceil(filtered.length/Q_PER_PAGE);
  if(currentQPage>totalPages) currentQPage=totalPages;

  // Paginate
  const pageItems=filtered.slice((currentQPage-1)*Q_PER_PAGE, currentQPage*Q_PER_PAGE);

  container.innerHTML=pageItems.map((item,i)=>{
    const globalNum=(currentQPage-1)*Q_PER_PAGE+i+1;
    return `
    <div class="qa-card">
      <div class="q-row">
        <span class="q-num">#${globalNum}</span>
        <span class="q-tag">${item.cat.replace(/-/g,' ')}</span>
        <div class="q-text">${item.q}</div>
      </div>
      <div class="answer">${item.a}</div>
    </div>
  `}).join('');

  buildQPagination(filtered);
}

function handleSearch(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  currentQPage=1;
  render(q);
}

buildNav();
render();
</script>
